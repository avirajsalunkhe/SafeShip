name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm ci
      
      - name: Build static site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r node_modules dist/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: yourdomain.com  # Optional: your custom domain

  backend-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm ci
      
      - name: Deploy Backend (Heroku example)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          npm install -g heroku
          heroku login
          heroku create safeship-backend --region us
          heroku config:set GEMINI_API_KEY=$GEMINI_API_KEY
          heroku config:set GROQ_API_KEY=$GROQ_API_KEY
          git push heroku main
