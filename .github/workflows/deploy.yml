name: Neural Deployment Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Inject Firebase config only ────────────────────────────────────
      # WORKER_URL is hardcoded in index.html (it's a URL, not a secret — safe to expose)
      # GEMINI_API_KEY and GROQ_API_KEY live only in Cloudflare Worker env vars (never here)
      - name: Inject Firebase Config
        shell: python
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
            import os, sys, json, re

            filename = 'index.html'
            if not os.path.exists(filename):
                print(f"[!] CRITICAL: {filename} not found.")
                sys.exit(1)

            with open(filename, 'r', encoding='utf-8') as f:
                content = f.read()

            firebase_raw = os.environ.get('FIREBASE_CONFIG', '').strip()

            # ── Parse Firebase config ──────────────────────────────────────
            firebase_object = 'null'
            if firebase_raw and firebase_raw != '{}':
                try:
                    normalized = firebase_raw
                    normalized = normalized.replace('\u201c', '"').replace('\u201d', '"')
                    normalized = normalized.replace('\u2018', "'").replace('\u2019', "'")
                    normalized = re.sub(r'([{,]\s*)([A-Za-z_][A-Za-z0-9_]*)(\s*:)', r'\1"\2"\3', normalized)
                    normalized = re.sub(r"'([^']*)'", r'"\1"', normalized)
                    normalized = re.sub(r',\s*}', '}', normalized)
                    parsed = json.loads(normalized)
                    firebase_object = json.dumps(parsed)
                    print(f"[*] Firebase OK — projectId: {parsed.get('projectId', 'unknown')}")
                except Exception as e:
                    print(f"[!] Firebase parse FAILED: {e} — running in standalone mode.")
            else:
                print("[!] FIREBASE_CONFIG empty — standalone mode (no history persistence).")

            if '__FIREBASE_CONFIG_JSON__' in content:
                content = content.replace('__FIREBASE_CONFIG_JSON__', firebase_object)
                print(f"[*] Firebase injected: {'OK' if firebase_object != 'null' else 'null (standalone)'}")
            else:
                print("[!] WARNING: __FIREBASE_CONFIG_JSON__ placeholder not found in index.html")

            with open(filename, 'w', encoding='utf-8') as f:
                f.write(content)

            print("[*] Deploy prep complete.")

      # ── Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Neural v6.2.4: Secure Worker Proxy [skip ci]"
