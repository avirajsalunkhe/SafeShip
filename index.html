<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeShip | Neural Trace Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        /**
         * SECRETS HANDSHAKE
         * These are replaced during the CI/CD build process using deploy.yml placeholders.
         */
        var SS_KEY_G = "[[ST_GEMINI_NODE]]";
        var SS_KEY_Q = "[[ST_GROQ_NODE]]";
        var SS_FB_RAW = "[[ST_FIREBASE_JSON]]";
        var SS_FB_CONF = null;
        
        try {
            // Check if injection occurred (placeholders no longer present)
            if (SS_FB_RAW && !SS_FB_RAW.includes("[[") && !SS_FB_RAW.includes("]]")) {
                SS_FB_CONF = typeof SS_FB_RAW === 'string' ? JSON.parse(SS_FB_RAW) : SS_FB_RAW;
            }
        } catch (e) {
            console.warn("Handshake: Firebase Config unavailable or malformed.");
        }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080909;
            --surface: #0f1010;
            --border: #1e2020;
            --border-bright: #2a2d2d;
            --text: #e8eaea;
            --muted: #5a6060;
            --accent: #00ff88;
            --accent-dim: rgba(0,255,136,0.08);
            --accent-border: rgba(0,255,136,0.2);
            --warn: #ffb800;
            --danger: #ff3b3b;
            --info: #3b9eff;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
        .mono { font-family: var(--font-mono); }

        #app { display: flex; height: 100vh; }
        #sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { height: 56px; min-height: 56px; background: rgba(8,9,9,0.9); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; backdrop-filter: blur(12px); }
        #content { flex: 1; overflow-y: auto; padding: 32px; }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .logo-icon svg { color: #000; width: 18px; height: 18px; }
        .logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; }

        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); transition: all 0.15s; border: 1px solid transparent; }
        .nav-item:hover { background: var(--accent-dim); color: var(--text); }
        .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }

        .sidebar-section-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--muted); padding: 16px 20px 8px; text-transform: uppercase; }
        .history-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
        .history-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; position: relative; margin-bottom: 4px; }
        .history-item:hover { background: var(--accent-dim); border-color: var(--accent-border); }

        .status-pill { display: flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-bright); }
        .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse-dot 2s infinite; }
        .status-dot.error { background: var(--danger); }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
        .section-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 20px; }
        .section-title span { color: var(--accent); }

        .text-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-family: var(--font-mono); font-size: 13px; color: var(--text); outline: none; }
        .btn-primary { background: var(--accent); color: #000; font-weight: 800; font-size: 12px; letter-spacing: 1px; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
        
        .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .check-chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; font-size: 11px; font-weight: 700; color: var(--muted); background: transparent; user-select: none; }
        .check-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
        .check-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-bright); }
        .check-chip.active .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

        .lang-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .lang-chip { font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; }
        .lang-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

        .dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .dropzone:hover { border-color: var(--accent-border); background: var(--accent-dim); }

        .code-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--font-mono); font-size: 12px; color: var(--text); outline: none; resize: vertical; min-height: 160px; }

        #loadingState { display: none; flex-direction: column; align-items: center; justify-content: center; height: 320px; gap: 20px; }
        .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Score Ring UI */
        .score-ring-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .score-ring-wrap svg { transform: rotate(-90deg); }
        .score-number { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-num { font-size: 26px; font-weight: 800; letter-spacing: -2px; }

        .finding-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        .finding-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
        .severity-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
        .badge-critical { background: rgba(255,59,59,0.15); color: var(--danger); }
        .badge-high { background: rgba(255,123,59,0.15); color: #ff7b3b; }

        .stat-box { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-num { font-size: 22px; font-weight: 800; }
        .stat-lbl { font-family: var(--font-mono); font-size: 9px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

        .tab-btn { font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; color: var(--muted); }
        .tab-btn.active { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
    </style>
</head>
<body>

<div id="app">
    <aside id="sidebar">
        <div class="p-5 border-b border-border">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="shield-check"></i></div>
                <div class="logo-text">SafeShip</div>
            </div>
        </div>

        <div class="p-2 space-y-1">
            <div class="nav-item active" onclick="switchTab('url')" id="nav-url"><i data-lucide="globe" style="width:15px"></i> URL Probe</div>
            <div class="nav-item" onclick="switchTab('code')" id="nav-code"><i data-lucide="file-code" style="width:15px"></i> SAST Audit</div>
            <div class="nav-item" onclick="switchTab('paste')" id="nav-paste"><i data-lucide="clipboard" style="width:15px"></i> Paste Code</div>
        </div>

        <div class="sidebar-section-title">Trace History</div>
        <div class="history-list" id="historyContainer"></div>

        <div class="p-3 mt-auto border-t border-border">
            <div class="bg-black border border-border rounded-lg p-3 flex items-center gap-3">
                <div class="w-7 h-7 bg-border rounded-full flex items-center justify-center"><i data-lucide="user" style="width:14px;color:var(--muted)"></i></div>
                <div class="node-id text-[9px] mono text-accent" id="userIdText">Handshake...</div>
            </div>
        </div>
    </aside>

    <div id="main">
        <div id="topbar">
            <div class="flex gap-2">
                <button class="tab-btn active" onclick="switchTab('url')" id="tab-url">URL Probe</button>
                <button class="tab-btn" onclick="switchTab('code')" id="tab-code">SAST Audit</button>
                <button class="tab-btn" onclick="switchTab('paste')" id="tab-paste">Paste Code</button>
            </div>
            <div class="status-pill">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-label" id="statusLabel">Standby</span>
            </div>
        </div>

        <div id="content">
            <!-- URL TAB -->
            <div id="tab-panel-url" class="tab-panel">
                <div class="section-title">Deep <span>Live</span> Probe.</div>
                <div class="card">
                    <div class="flex gap-2 mb-4">
                        <input type="text" class="text-input" id="urlInput" placeholder="https://api.target.com/v1">
                        <button class="btn-primary" onclick="startAudit('url')">INITIATE</button>
                    </div>
                    <div class="check-grid" id="urlChecks">
                        <div class="check-chip active" onclick="this.classList.toggle('active')"><span class="dot"></span>XSS Detection</div>
                        <div class="check-chip active" onclick="this.classList.toggle('active')"><span class="dot"></span>SQL Injection</div>
                        <div class="check-chip active" onclick="this.classList.toggle('active')"><span class="dot"></span>HTTP Headers</div>
                        <div class="check-chip active" onclick="this.classList.toggle('active')"><span class="dot"></span>CSRF Risks</div>
                    </div>
                </div>
            </div>

            <!-- CODE TAB -->
            <div id="tab-panel-code" class="tab-panel" style="display:none">
                <div class="section-title">Neural <span>SAST</span>.</div>
                <div class="card">
                    <div class="lang-grid mb-4">
                        <div class="lang-chip active" onclick="setLang(this, 'auto')">Auto Detect</div>
                        <div class="lang-chip" onclick="setLang(this, 'javascript')">JS</div>
                        <div class="lang-chip" onclick="setLang(this, 'python')">Python</div>
                        <div class="lang-chip" onclick="setLang(this, 'java')">Java</div>
                    </div>
                    <div class="dropzone" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
                        <i data-lucide="upload-cloud" class="mx-auto mb-3 text-muted"></i>
                        <div class="text-sm font-bold text-muted">Drop files or click to upload</div>
                        <div id="fileStatus" class="text-[10px] mono text-accent mt-2"></div>
                    </div>
                    <button class="btn-primary w-full mt-4" onclick="startAudit('code')">ANALYZE CODEBASE</button>
                </div>
            </div>

            <!-- PASTE TAB -->
            <div id="tab-panel-paste" class="tab-panel" style="display:none">
                <div class="section-title">Paste & <span>Trace</span>.</div>
                <div class="card">
                    <textarea class="code-textarea" id="pasteInput" placeholder="// Paste source for analysis..."></textarea>
                    <button class="btn-primary w-full mt-4" onclick="startAudit('paste')">ANALYZE PASTE</button>
                </div>
            </div>

            <!-- RESULTS -->
            <div id="resultsArea">
                <div id="idleState" class="mt-8 text-center text-muted text-xs mono">AWAITING SIGNAL...</div>
                <div id="loadingState">
                    <div class="spinner"></div>
                    <div class="mono text-accent text-[10px] tracking-widest mt-4">TRACING VECTORS...</div>
                </div>
                <div id="contentState" class="mt-8 hidden"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.STATE = {
        lang: 'auto',
        files: [],
        appId: 'safeship-v7-full'
    };

    // Firebase
    if (window.SS_FB_CONF) {
        const app = initializeApp(window.SS_FB_CONF);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.DB = db;

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('userIdText').innerText = user.uid.slice(0,18);
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('statusLabel').innerText = "Link Established";
                loadHistory(user.uid);
            }
        });
        signInAnonymously(auth);
    } else {
        document.getElementById('statusLabel').innerText = "Standalone Mode";
    }

    async function loadHistory(uid) {
        if (!window.DB) return;
        const q = collection(window.DB, 'artifacts', window.STATE.appId, 'users', uid, 'audits');
        onSnapshot(q, snap => {
            const container = document.getElementById('historyContainer');
            container.innerHTML = snap.docs.map(doc => `
                <div class="history-item text-[10px] mono text-muted">
                    <span class="text-accent">${doc.data().score}</span> | ${doc.data().target}
                </div>
            `).join('');
        });
    }

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        document.getElementById(`tab-panel-${tab}`).style.display = 'block';
        document.querySelectorAll('.nav-item, .tab-btn').forEach(i => i.classList.remove('active'));
        document.getElementById(`nav-${tab}`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    };

    window.setLang = (el, l) => {
        document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        window.STATE.lang = l;
    };

    window.handleFiles = (fs) => {
        window.STATE.files = [];
        Array.from(fs).forEach(f => {
            const r = new FileReader();
            r.onload = e => window.STATE.files.push({ name: f.name, content: e.target.result });
            r.readAsText(f);
        });
        document.getElementById('fileStatus').innerText = `${fs.length} files loaded`;
    };

    window.startAudit = async (mode) => {
        let content = "";
        if (mode === 'url') content = document.getElementById('urlInput').value;
        else if (mode === 'paste') content = document.getElementById('pasteInput').value;
        else content = window.STATE.files.map(f => `// FILE: ${f.name}\n${f.content}`).join('\n\n');

        if (!content) return;

        document.getElementById('idleState').style.display = 'none';
        document.getElementById('loadingState').style.display = 'flex';
        document.getElementById('contentState').classList.add('hidden');

        try {
            const data = await callAI(content);
            renderResults(data, content.slice(0, 20));
            if (window.DB && getAuth().currentUser) {
                addDoc(collection(window.DB, 'artifacts', window.STATE.appId, 'users', getAuth().currentUser.uid, 'audits'), {
                    target: content.slice(0, 25),
                    score: data.score,
                    timestamp: serverTimestamp()
                });
            }
        } catch (e) {
            alert("Trace Failed: " + e.message);
        } finally {
            document.getElementById('loadingState').style.display = 'none';
        }
    };

    async function callAI(text) {
        const prompt = `Security Audit: ${text}. Return JSON: {score, grade, summary, stats:{critical,high,medium,low}, findings:[{title, severity, description, fix}]}`;
        
        // Use Gemini 1.5 Flash (Stable)
        const geminiKey = window.SS_KEY_G;
        if (geminiKey && !geminiKey.includes("[[")) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: 'application/json' } })
                });
                if (res.ok) {
                    const json = await res.json();
                    return JSON.parse(json.candidates[0].content.parts[0].text);
                }
            } catch (e) { console.warn("Gemini Node Offline"); }
        }

        // Groq Fallback
        const groqKey = window.SS_KEY_Q;
        if (groqKey && !groqKey.includes("[[")) {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: prompt }], response_format: { type: 'json_object' } })
            });
            const json = await res.json();
            return JSON.parse(json.choices[0].message.content);
        }

        throw new Error("No available neural nodes.");
    }

    function renderResults(d, target) {
        const ct = document.getElementById('contentState');
        ct.classList.remove('hidden');
        
        const score = d.score || 0;
        const circumference = 2 * Math.PI * 44;
        const offset = circumference - (score / 100) * circumference;
        const stats = d.stats || { critical: 0, high: 0, medium: 0, low: 0 };

        ct.innerHTML = `
            <div class="card mb-6">
                <div class="flex items-center gap-6 mb-6">
                    <div class="score-ring-wrap">
                        <svg viewBox="0 0 100 100" width="100" height="100">
                            <circle cx="50" cy="50" r="44" fill="none" stroke="var(--border)" stroke-width="6"/>
                            <circle cx="50" cy="50" r="44" fill="none" stroke="var(--accent)" stroke-width="6" 
                                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
                        </svg>
                        <div class="score-number">
                            <div class="score-num text-accent">${score}</div>
                            <div class="text-[8px] mono text-muted">SCORE</div>
                        </div>
                    </div>
                    <div>
                        <div class="text-[10px] mono text-muted uppercase tracking-widest mb-1">Audit Summary</div>
                        <div class="text-xl font-bold mb-2">${d.grade || 'Trace Result'}</div>
                        <p class="text-xs text-muted leading-relaxed">${d.summary}</p>
                    </div>
                </div>

                <div class="flex gap-2">
                    <div class="stat-box"><div class="stat-num text-danger">${stats.critical}</div><div class="stat-lbl">Crit</div></div>
                    <div class="stat-box"><div class="stat-num text-[#ff7b3b]">${stats.high}</div><div class="stat-lbl">High</div></div>
                    <div class="stat-box"><div class="stat-num text-warn">${stats.medium}</div><div class="stat-lbl">Med</div></div>
                    <div class="stat-box"><div class="stat-num text-info">${stats.low}</div><div class="stat-lbl">Low</div></div>
                </div>
            </div>

            <div class="space-y-3">
                ${(d.findings || []).map(f => `
                    <div class="finding-card">
                        <div class="finding-header">
                            <span class="text-xs font-bold">${f.title}</span>
                            <span class="severity-badge badge-${f.severity.toLowerCase()}">${f.severity.toUpperCase()}</span>
                        </div>
                        <div class="px-4 pb-4">
                            <p class="text-[11px] text-muted leading-relaxed mb-3">${f.description}</p>
                            <div class="bg-black border border-border rounded p-3 text-[10px] mono text-accent">
                                <div class="text-muted mb-1">// RECOMMENDATION</div>
                                ${f.fix}
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        lucide.createIcons();
    }

    lucide.createIcons();
</script>

</body>
</html>
